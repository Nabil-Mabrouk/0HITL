<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0-HITL Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0b0e; color: #e2e8f0; }
        .mono { font-family: 'Fira Code', monospace; }
        .thought-bubble { border-left: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .tool-bubble { border-left: 2px solid #10b981; background: rgba(16, 185, 129, 0.05); }
        .security-alert { border-left: 2px solid #ef4444; background: rgba(239, 68, 68, 0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1c23; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 p-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-blue-600 rounded-lg">
                <i data-lucide="zap" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">0-HITL <span class="text-slate-500 font-normal">Mission Control</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 text-xs border border-slate-700">
                <span class="w-2 h-2 rounded-full bg-slate-500 animate-pulse"></span>
                <span id="status-text">DISCONNECTED</span>
            </div>
            <button id="kill-btn" class="px-4 py-2 bg-red-600/20 hover:bg-red-600/40 text-red-400 border border-red-500/30 rounded-lg text-sm font-medium transition-all flex items-center gap-2">
                <i data-lucide="shield-off" class="w-4 h-4"></i> EMERGENCY STOP
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar: Sessions & Stats -->
        <aside class="w-72 border-r border-slate-800 p-6 flex flex-col gap-8 bg-slate-900/20">
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 block">Active Session</label>
                <input id="session-input" type="text" value="e2e-test" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-2">
                <button id="connect-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2 text-sm font-medium transition-all">CONNECT</button>
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 block">Telemetry</label>
                <div class="space-y-4">
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                        <div class="text-xs text-slate-400 mb-1">Active Runtimes</div>
                        <div class="text-xl font-bold mono" id="stat-docker">0</div>
                    </div>
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                        <div class="text-xs text-slate-400 mb-1">Runtime Execs</div>
                        <div class="text-xl font-bold mono" id="stat-tokens">0</div>
                    </div>
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                        <div class="text-xs text-slate-400 mb-1">Memory L3 Hits</div>
                        <div class="text-xl font-bold mono" id="stat-l3">0</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Center: Streams -->
        <section class="flex-1 flex flex-col overflow-hidden bg-black/20">
            <div id="stream-container" class="flex-1 overflow-y-auto p-6 space-y-6">
                <!-- Messages will appear here -->
                <div class="text-center text-slate-500 mt-20">
                    <i data-lucide="activity" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                    <p>Enter a Session ID and Connect to view live telemetry.</p>
                </div>
            </div>

            <!-- Interaction Bar -->
            <div class="p-6 border-t border-slate-800 bg-slate-900/30">
                <div class="flex gap-4">
                    <input id="chat-input" type="text" placeholder="Send a mission to the Orchestrator..." class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition-all">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
