services:
  0-hitl-brain:
    build: .
    container_name: zero-hitl-brain
    env_file:
      - .env
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: ./memory.db
        target: /app/memory.db
      - type: bind
        source: ./workspace
        target: /app/workspace
      - type: bind
        source: ./skills
        target: /app/skills
      - type: bind
        source: ./profiles
        target: /app/profiles
    ports:
      - "8000:8000"
